<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>NGR EXCHANGE TERMINAL v4.0</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        /* Критические стили для мгновенного отображения */
        :root {
            --bg-color: #050a12;
            --accent-color: #ffcc00;
        }
        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }
        /* Прелоадер NGR */
        #ngr-preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-logo {
            font-size: 40px;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            margin-bottom: 20px;
        }
        .loader-bar {
            width: 150px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .loader-bar::after {
            content: '';
            position: absolute;
            width: 60px; height: 100%;
            background: var(--accent-color);
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { left: -60px; }
            100% { left: 150px; }
        }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ngr-preloader">
        <div class="loader-logo">NGR</div>
        <div class="loader-bar"></div>
        <div style="margin-top: 15px; font-size: 10px; letter-spacing: 2px; color: #5c6b7f;">CORE SYSTEM LOADING...</div>
    </div>

    <div id="app-wrapper">
        
        <header id="header">
            <div id="user-info">
                <div class="avatar-container">
                    <img id="user-photo" src="" alt="👤">
                    <div class="status-badge"></div>
                </div>
                <div class="user-meta">
                    <div id="user-name">Инициализация...</div>
                    <div class="user-rank">NGR Elite Member</div>
                </div>
            </div>
            <div id="user-balance">
                </div>
        </header>

        <section class="chart-section">
            <div class="section-header">
                <h3><span class="icon">📊</span> Аналитика Рынка</h3>
                <div id="chart-timeframe">1D</div>
            </div>
            <div id="chart-container">
                </div>
        </section>

        <section id="admin-container">
            </section>

        <section class="market-section">
            <div id="market-grid">
                </div>
        </section>

        <footer class="terminal-footer">
            <div class="version">NGR TERMINAL v4.0.5 PRO</div>
            <div class="connection-status">
                <span class="dot"></span> SECURE CONNECTION ACTIVE
            </div>
        </footer>

    </div>

    <div id="global-modal" class="modal-overlay hidden">
        <div class="modal-window">
            <div id="modal-header"></div>
            <div id="modal-body"></div>
            <div id="modal-footer">
                <button class="modal-close-btn" onclick="closeGlobalModal()">ВЕРНУТЬСЯ</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        // Скрипт для скрытия прелоадера после загрузки
        window.addEventListener('load', () => {
            setTimeout(() => {
                const preloader = document.getElementById('ngr-preloader');
                preloader.classList.add('hidden');
            }, 1500);
        });

        function closeGlobalModal() {
            document.getElementById('global-modal').classList.add('hidden');
        }
    </script>

</body>
</html>
