<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NGR TERMINAL OS v12.1 — INDUSTRIAL BUILD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #050a12; --bg-panel: #0b1422; --accent: #ffcc00;
            --text-main: #ffffff; --text-dim: #8a9ab0; --up-color: #00ff88;
        }
        body {
            background: var(--bg-dark); color: var(--text-main);
            margin: 0; font-family: sans-serif; overflow: hidden;
            position: fixed; width: 100%; height: 100%;
        }
        #app-wrapper { height: 100%; display: flex; flex-direction: column; }
        header {
            padding: 20px; border-bottom: 1px solid rgba(255,204,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        #chart-container { width: 100%; height: 200px; background: #000; }
        #market-grid { padding: 20px; flex: 1; overflow-y: auto; }
        .asset-card {
            background: var(--bg-panel); margin-bottom: 10px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            border-left: 4px solid var(--accent);
        }
        .price { color: var(--accent); font-weight: bold; }
        .boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; font-family: monospace;
        }
    </style>
</head>
<body>

<div id="boot" class="boot-screen">
    <div id="boot-logs"></div>
</div>

<div id="app-wrapper">
    <header>
        <div>
            <div style="font-size: 10px; color: var(--text-dim)">OPERATOR</div>
            <div id="user-name">ALIZHAN</div>
        </div>
        <div style="text-align: right">
            <div style="font-size: 10px; color: var(--text-dim)">BALANCE</div>
            <div id="balance" style="color: var(--accent)">0.00 $</div>
        </div>
    </header>

    <div id="chart-container"></div>
    <div id="market-grid"></div>
</div>

<script>
// --- CONFIG ---
const ASSETS = [
    { id: 'stars', name: 'Telegram Stars', symbol: 'STARS', price: 0.02, icon: '⭐' },
    { id: 'dst', name: 'DST Token', symbol: 'DST', price: 1.50, icon: '📀' },
    { id: 'ngr', name: 'NGR Coin', symbol: 'NGRC', price: 5.00, icon: '💎' }
];

// --- CORE ENGINE ---
class NGRTerminal {
    constructor() {
        this.tg = window.Telegram.WebApp;
        this.init();
    }

    async init() {
        this.log("INITIALIZING NGR CORE...");
        await new Promise(r => setTimeout(r, 1000));
        
        this.tg.ready();
        this.tg.expand();
        
        document.getElementById('boot').style.display = 'none';
        this.renderMarket();
        this.initChart();
    }

    log(msg) {
        const line = document.createElement('div');
        line.innerText = `> ${msg}`;
        document.getElementById('boot-logs').appendChild(line);
    }

    renderMarket() {
        const grid = document.getElementById('market-grid');
        grid.innerHTML = ASSETS.map(asset => `
            <div class="asset-card">
                <div>
                    <div>${asset.icon} <b>${asset.symbol}</b></div>
                    <div style="font-size: 10px; color: var(--text-dim)">${asset.name}</div>
                </div>
                <div class="price">${asset.price.toFixed(2)} $</div>
            </div>
        `).join('');
    }

    initChart() {
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: '#050a12', textColor: '#8a9ab0' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#1e2a3a' } },
            timeScale: { visible: false }
        });
        const series = chart.addAreaSeries({ lineColor: '#ffcc00', topColor: 'rgba(255,204,0,0.3)', bottomColor: 'transparent' });
        
        // Data simulation
        let data = [];
        for(let i=0; i<100; i++) data.push({ time: i, value: 5 + Math.random() * 2 });
        series.setData(data);

        setInterval(() => {
            const last = data[data.length-1];
            const next = { time: last.time + 1, value: last.value + (Math.random() - 0.5) };
            series.update(next);
            data.push(next);
        }, 2000);
    }
}

// Запуск
window.onload = () => { new NGRTerminal(); };
</script>

</body>
</html>
